name: Deploy Demo
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SB_pathPrefix: "/iceberg-stac-browser"
      SB_historyMode: "hash"
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          exclude_assets: 'report.html'
          user_name: 'Iceberg STAC Browser CI'
          user_email: cayetano@carto.com
